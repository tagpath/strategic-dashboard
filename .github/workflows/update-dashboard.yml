name: 'Update Strategic Dashboard'

on:
  schedule:
    - cron: '0 9 * * 1'  # Toda segunda-feira às 9h BRT
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Dashboard Update
      run: python update_dashboard.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and Push Changes
      run: |
        git config user.name github-actions[bot]
        git config user.email github-actions[bot]@users.noreply.github.com
        git add context.json ceo_strategic_dashboard.html
        git commit -m "chore: auto-update dashboard [skip ci]" || echo "No changes to commit"
        git push
